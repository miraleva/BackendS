# English localization messages

out.of.scope=I can only assist you with hotel searches, flight ticket searches, and reservations.
out.of.scope.terminated=This chat has been terminated due to multiple irrelevant messages.

clarify.intent=Would you like to search for a hotel or a flight ticket?

ask.missing.single=Could you specify the {0} to perform the search?
ask.missing.multiple=Could you specify the following missing information: {0}?

# Fields for dynamic substitution
field.locationOrHotelName=location or hotel name
field.checkInDate=check-in date
field.checkOutDate=check-out date
field.adultCount=adult count
field.childCount=child count
field.childAges=children ages
field.infantCount=infant count
field.infantAges=infant ages
field.currency=currency
field.departureLocation=departure location
field.arrivalLocation=arrival location
field.departureDate=departure date
field.passengerCount=passenger count
field.tripType=trip type
field.returnDate=return date

# General system errors and fallbacks
system.error.terminated=This chat has been terminated. Please refresh the page to start a new search.
system.error.general=A system error occurred, please try again later.
search.success.fallback=Search successfully completed. Here are the top results:

invalid.date.past=The provided date is in the past. Please enter a valid future date.
invalid.date.mismatch=The return/check-out date must be after the check-in/departure date.
invalid.date.too.far=The date you entered is too far in the future. Please choose a date within the next 2 years.
error.no.adults=Hotel reservations require at least one adult.
error.negative.count=The number of guests/passengers cannot be negative. Please enter a valid number.
error.too.many.guests=A hotel search can have at most {0} guests (adults+children+infants). Please reduce the number.
error.too.many.passengers=A flight search can have at most {0} passengers. Please reduce the number.
error.too.many.rooms=The number of rooms cannot exceed the total number of guests or be unreasonably high. Please reduce the room count.
#search.no.results=No results were found matching your criteria.

welcome.intent=Welcome! I can help you find the best hotel and flight options — just tell me your destination, dates, and how many guests.

