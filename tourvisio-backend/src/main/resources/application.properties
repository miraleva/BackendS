spring.application.name=tourvisio-backend
server.port=8081

# Springdoc Swagger-UI configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operations-sorter=alpha

# Database properties configuration
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/tourvisio_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# TourVisio API properties
tourvisio.api.base-url=${TOURVISIO_API_BASE_URL:https://api.tourvisio.com}
tourvisio.api.token=${TOURVISIO_API_TOKEN:mock_token}
tourvisio.api.mock-mode=${TOURVISIO_MOCK_MODE:true}

