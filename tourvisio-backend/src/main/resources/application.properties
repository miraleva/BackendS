server.port=8082

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operations-sorter=alpha

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

tourvisio.api.base-url=https://example.com
tourvisio.api.token=dummy-token
# true = mock data doner, false = gercek API'ye baglanir


# =============================================================================
# AI Provider Configuration
# =============================================================================
# GUVENLIK: API key'i bu dosyaya YAZMAYIN.
# Bunun yerine environment variable kullanın:
#   Windows PowerShell : $env:AI_API_KEY = "sk-..."
#   Linux/macOS        : export AI_API_KEY=sk-...
#   Docker             : -e AI_API_KEY=sk-...
#   IntelliJ Run Config: Environment variables > AI_API_KEY=sk-...
#
# Key tanımlanmazsa uygulama MOCK modda baslar (gelistirme ortami icin idealdir).
# =============================================================================
ai.openai.api-key=${AI_API_KEY:}
ai.openai.model=gpt-4o-mini
