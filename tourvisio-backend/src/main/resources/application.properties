# =============================================================================
# TourVisio API Configuration
# =============================================================================
# GUVENLIK: Credential bilgilerini bu dosyaya YAZMAYIN.
# Bunun yerine environment variable kullanin:
#   Windows PowerShell : $env:TOURVISIO_BASE_URL = "https://test-service.tourvisio.com/v2"
#                        $env:TOURVISIO_AGENCY   = "your-agency"
#                        $env:TOURVISIO_USERNAME  = "your-username"
#                        $env:TOURVISIO_PASSWORD  = "your-password"
#                        $env:TOURVISIO_MOCK_MODE = "false"
#   Linux/macOS        : export TOURVISIO_BASE_URL=https://test-service.tourvisio.com/v2
#   Docker             : -e TOURVISIO_BASE_URL=... -e TOURVISIO_AGENCY=... ...
#   IntelliJ Run Config: Environment variables > TOURVISIO_BASE_URL=...
#
# Degerler tanimlanmazsa uygulama MOCK modda baslar.
# =============================================================================
tourvisio.api.base-url=${TOURVISIO_BASE_URL:https://test-service.tourvisio.com/v2/api/}
tourvisio.api.agency=${TOURVISIO_AGENCY:INTERNSHIP}
tourvisio.api.username=${TOURVISIO_USERNAME:INTERNSHIP}
tourvisio.api.password=${TOURVISIO_PASSWORD:1}
# true = mock data doner, false = gercek API'ye baglanir
tourvisio.api.mock-mode=${TOURVISIO_MOCK_MODE:false}

# =============================================================================
# AI Provider Configuration
# =============================================================================
# GUVENLIK: API key'i bu dosyaya YAZMAYIN.
# Bunun yerine environment variable kullanın:
#   Windows PowerShell : $env:AI_API_KEY = "sk-..."
#   Linux/macOS        : export AI_API_KEY=sk-...
#   Docker             : -e AI_API_KEY=sk-...
#   IntelliJ Run Config: Environment variables > AI_API_KEY=sk-...
#
# Key tanımlanmazsa uygulama MOCK modda baslar (gelistirme ortami icin idealdir).
# =============================================================================
ai.openai.api-key=${AI_API_KEY:}
ai.openai.model=gpt-4o-mini

# =============================================================================
# Gemini API Configuration
# =============================================================================
# GUVENLIK: API key'i bu dosyaya YAZMAYIN.
# Bunun yerine environment variable kullanın:
