spring.application.name=tourvisio-backend
server.port=8081

# Springdoc Swagger-UI configuration
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.operations-sorter=alpha

# Database properties configuration
spring.datasource.url=${DB_URL:}
spring.datasource.username=${DB_USERNAME:}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=${DB_DRIVER_CLASS:org.postgresql.Driver}
spring.jpa.properties.hibernate.dialect=${DB_DIALECT:org.hibernate.dialect.PostgreSQLDialect}

spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.format_sql=true

# TourVisio API properties
tourvisio.api.base-url=${TOURVISIO_API_BASE_URL:}
tourvisio.api.token=${TOURVISIO_API_TOKEN:}
tourvisio.api.mock-mode=${TOURVISIO_MOCK_MODE:true}

