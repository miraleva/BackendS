hotel.search.no.results.with.dates=Für die angegebenen Daten waren keine Hotels verfügbar. Die nächstgelegenen verfügbaren Termine für diesen Ort sind: {0}. Sie können mit einem dieser Termine erneut suchen.
hotel.search.error=Der Hotelsuchdienst ist derzeit nicht verfügbar, bitte versuchen Sie es später noch einmal.
