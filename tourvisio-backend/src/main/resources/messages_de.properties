# General system errors and fallbacks
system.error.terminated=Dieser Chat wurde beendet. Bitte aktualisieren Sie die Seite, um eine neue Suche zu starten.
system.error.general=Es ist ein Systemfehler aufgetreten, bitte versuchen Sie es später noch einmal.
search.success.fallback=Die Suche wurde erfolgreich abgeschlossen. Hier sind die besten Ergebnisse:

invalid.date.past=Das angegebene Datum liegt in der Vergangenheit. Bitte geben Sie ein gültiges zukünftiges Datum ein.
invalid.date.mismatch=Das Rückreise-/Abreisedatum muss nach dem Anreisedatum liegen.
invalid.date.too.far=Das eingegebene Datum liegt zu weit in der Zukunft. Bitte wählen Sie ein Datum innerhalb der nächsten 2 Jahre.
error.no.adults=Für Hotelreservierungen ist mindestens ein Erwachsener erforderlich.
error.negative.count=Die Anzahl der Gäste/Passagiere darf nicht negativ sein. Bitte geben Sie eine gültige Zahl ein.
error.too.many.guests=Eine Hotelsuche kann höchstens {0} Gäste (Erwachsene+Kinder+Kleinkinder) umfassen. Bitte reduzieren Sie die Anzahl.
error.too.many.passengers=Eine Flugsuche kann höchstens {0} Passagiere umfassen. Bitte reduzieren Sie die Anzahl.
error.too.many.rooms=Die Anzahl der Zimmer darf die Gesamtzahl der Gäste nicht überschreiten oder unrealistisch hoch sein. Bitte reduzieren Sie die Zimmeranzahl.
#search.no.results=Es wurden keine Ergebnisse gefunden, die Ihren Kriterien entsprechen.

welcome.intent=Willkommen! Ich helfe Ihnen gerne dabei, die besten Hotel- und Flugoptionen zu finden. Teilen Sie mir einfach Ihr Reiseziel, die Daten und die Anzahl der Gäste mit.

